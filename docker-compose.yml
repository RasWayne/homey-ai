services:

  postgres:
    image: postgres:16
    container_name: estateai-postgres
    restart: always
    environment:
      POSTGRES_DB: estateai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: estateai-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: estateai-backend
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/estateai
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NODE_ENV: development
      PORT: 4000
    volumes:
      - ./backend:/app
    command: npm run start:dev

  frontend:
    build: ./frontend
    container_name: estateai-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    volumes:
      - ./frontend:/app
    command: npm run dev

volumes:
  postgres_data:
